<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5A8A5E;--sage-light:#8BB88F;--sage-pale:#EEF4EE;--sage-border:#d4e8d5;
  --terra:#C97458;--terra-pale:#FAF0EC;--terra-border:#F0CDBE;--terra-dark:#A05840;
  --bg:#F5F3F0;--card:#FFFFFF;--border:#E5DED5;--subtle:#F2EDE6;
  --text:#2D2926;--muted:#7C7670;--light:#A8A29C;
  --sidebar:#2D2926;--sidebar-hover:#3D3936;--sidebar-active:#4A4542;
  --blue:#4A90D9;--blue-pale:#EBF3FB;--blue-border:#B8D4F0;
}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h1{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px}
.sidebar-brand p{font-size:11px;color:rgba(255,255,255,.45)}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.8)}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:600}
.nav-item svg{flex-shrink:0}
.nav-section{font-size:10px;color:rgba(255,255,255,.3);padding:16px 12px 6px;text-transform:uppercase;letter-spacing:1px}
.main{flex:1;overflow-y:auto;padding:0}
.page-header{padding:24px 32px 0;margin-bottom:0}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:13px;color:var(--muted)}
.page-body{padding:20px 32px 40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-box .label{font-size:11px;color:var(--muted);margin-bottom:6px}
.stat-box .value{font-size:28px;font-weight:700;color:var(--text)}
.stat-box .sub{font-size:11px;color:var(--light);margin-top:4px}
.stat-box.sage .value{color:var(--sage)}
.stat-box.terra .value{color:var(--terra)}
.stat-box.blue .value{color:var(--blue)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--sage);color:#fff}.btn-primary:hover{opacity:.85}
.btn-terra{background:var(--terra);color:#fff}.btn-terra:hover{opacity:.85}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--sage);color:var(--sage)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:none;border:1px solid #e5c3c3;color:#c44}.btn-danger:hover{background:#fef2f2}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);border-bottom:2px solid var(--border);background:var(--subtle)}
td{padding:10px 12px;border-bottom:1px solid #f0ebe3;vertical-align:top}
tr:hover td{background:#faf9f7}
.chip{display:inline-block;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:500;margin:1px 2px}
.chip-sage{background:var(--sage-pale);color:var(--sage)}
.chip-terra{background:var(--terra-pale);color:var(--terra)}
.chip-blue{background:var(--blue-pale);color:var(--blue)}
.chip-gray{background:#f0ebe3;color:var(--muted)}
.chip-sm{padding:1px 8px;font-size:10px}
input[type=text],input[type=number],textarea,select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--card);color:var(--text);transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--sage)}
textarea{resize:vertical;min-height:60px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag-item{display:flex;align-items:center;gap:4px;background:var(--subtle);border:1px solid var(--border);border-radius:99px;padding:3px 10px;font-size:12px}
.tag-item .remove{cursor:pointer;color:var(--light);font-size:14px;margin-left:2px}.tag-item .remove:hover{color:var(--terra)}
.toggle{position:relative;width:36px;height:20px;background:#d1d5db;border-radius:10px;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--sage)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.dim-group{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:#faf9f7}
.dim-group-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dim-tag-row{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.empty-state{text-align:center;padding:60px 0;color:var(--muted)}
.empty-state p{margin-bottom:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100}
.modal-overlay.open{display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--card);border-radius:16px;width:90%;max-width:720px;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-box h2{font-size:18px;font-weight:700;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.source-badge{font-size:10px;border-radius:4px;padding:2px 6px;background:#F0EBE3;color:var(--muted)}
.source-badge.curated{background:#E4F0E5;color:#3D6B40}
.recent-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f0ea}
.recent-item:last-child{border-bottom:none}
.recent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.recent-info{flex:1}
.recent-info .title{font-size:13px;font-weight:500}
.recent-info .time{font-size:11px;color:var(--light)}
.prompt-box{background:#1e1e1e;color:#d4d4d4;border-radius:10px;padding:16px;font-family:"Cascadia Code","Fira Code",monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.prompt-box .var{color:#9cdcfe}.prompt-box .str{color:#ce9178}.prompt-box .kw{color:#569cd6}
.test-result{background:var(--sage-pale);border:1px solid var(--sage-border);border-radius:10px;padding:16px;margin-top:12px;font-size:13px;line-height:1.7}
.test-result.error{background:var(--terra-pale);border-color:var(--terra-border)}
.doc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.doc-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.doc-card h4{font-size:14px;font-weight:600;margin-bottom:4px}
.doc-card p{font-size:12px;color:var(--muted);line-height:1.5}
.doc-card .meta{display:flex;gap:8px;margin-top:8px;font-size:11px;color:var(--light)}
.pipeline-step{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;transition:border-color .3s}
.pipeline-step.active{border-color:var(--sage);box-shadow:0 0 0 2px rgba(90,138,94,.1)}
.pipeline-step.done{border-color:var(--sage);background:var(--sage-pale)}
.pipeline-step.fail{border-color:var(--terra);background:var(--terra-pale)}
.pipeline-step .step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;background:var(--subtle);color:var(--muted);margin-right:8px}
.pipeline-step.done .step-num{background:var(--sage);color:#fff}
.pipeline-step.fail .step-num{background:var(--terra);color:#fff}
.pipeline-step .step-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.pipeline-step .step-body{margin-top:10px;font-size:12px;line-height:1.7;color:var(--muted)}
.pipeline-step .step-body strong{color:var(--text)}
.pipeline-arrow{text-align:center;color:var(--light);font-size:18px;margin:-4px 0}
.embed-result{background:var(--purple-pale,#f3effa);border:1px solid var(--purple-border,#d4c5f0);border-radius:10px;padding:14px;margin-top:10px}
.embed-result .vec{font-size:10px;color:var(--muted);word-break:break-all;max-height:60px;overflow-y:auto;font-family:monospace}
.similarity-bar{height:8px;border-radius:4px;background:var(--subtle);margin-top:6px;overflow:hidden}
.similarity-bar .fill{height:100%;border-radius:4px;transition:width .5s}
.ocr-drop{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--subtle)}
.ocr-drop:hover{border-color:var(--sage)}
.ocr-drop.dragover{border-color:var(--sage);background:var(--sage-pale)}
.ocr-preview{max-width:100%;max-height:200px;border-radius:8px;margin-top:10px}
.metric-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.metric-bar .bar-bg{flex:1;height:6px;border-radius:3px;background:var(--subtle);overflow:hidden}
.metric-bar .bar-fill{height:100%;border-radius:3px;transition:width .5s}
.metric-bar .bar-label{font-size:11px;color:var(--muted);min-width:90px}
.metric-bar .bar-value{font-size:11px;font-weight:600;min-width:40px;text-align:right}

   content:"一、三条主流入行路径\n\n路径1：瑜伽先行转普拉提（约40%从业者选择）\n- 先考取RYT200瑜伽教练证（1-3个月，费用0.8-1.5万）\n- 积累6-12个月教学经验\n- 再进修普拉提认证（3-6个月，费用2-4万）\n- 优势：收入来源不断，教学基础扎实\n- 劣势：总周期长（1.5-2年），总投入较高\n\n路径2：直接普拉提认证（约35%从业者选择）\n- 直接报名普拉提认证课程（3-6个月，费用2-5万）\n- 认证后开始求职或兼职\n- 优势：路径最短，目标明确\n- 劣势：零基础学习强度大，初期就业面窄\n\n路径3：双证并行（约25%从业者选择）\n- 同时报名瑜伽和普拉提课程\n- 6-12个月内完成双证\n- 优势：就业面最广，竞争力强\n- 劣势：学习压力大，经济投入最高\n\n二、关键数据\n- 入行到稳定月入1万+平均需要8-14个月\n- 持双证老师比单证老师平均月收入高30%\n- 零基础转行成功率约65%（1年后仍在行业）\n\n三、常见误区\n- 误区1：证书越多越好→实际市场更看重教学经验\n- 误区2：选最便宜的课→学习周期过短技术积累不足\n- 误区3：拿到证就能赚钱→实际需要3-6个月积累学员",
   source:"从业者问卷 + 深度访谈",date:"2025-02",relatedTopics:["first-cert"]},
  {id:"doc-anatomy-value",title:"解剖修复方向投入产出分析",category:"方向评估",
   tags:["body-spine","body-hip","body-pelvis","body-lumbar","scn-adv","scn-income","act-functional"],
   content:"一、收入对比\n修复类私教均价350-600元/节，普通私教200-400元/节，溢价约50-80%。但修复类招生难度比普通课程高约30%，主要因为：学员需要有一定身体认知基础，且对老师专业度要求更高。\n\n二、适合切入阶段\n建议有1-2年教学经验后再切入修复方向。原因：\n- 修复课程需要扎实的解剖学基础和丰富的教学观察经验\n- 新手老师缺乏足够案例积累，难以建立学员信任\n- 已有稳定学员基础后，可将修复作为高端产品线切入\n\n三、学习投入\n- 解剖修复类进修课程费用1-3万元\n- 学习周期3-6个月\n- 需要持续跟案积累经验\n\n四、收入模型\n- 普通私教老师：月收入0.8-1.5万\n- 加入修复方向后：月收入1.5-3万（前提是有稳定学员转化）\n- 修复方向天花板更高，但起步期收入可能暂时下降",
   source:"从业者收入调研 + 工作室定价采集",date:"2025-01",relatedTopics:["anatomy"]},
  {id:"doc-income-data",title:"瑜伽普拉提老师收入结构调研",category:"行业数据",
   tags:["scn-income","scn-sales","scn-renew","ppl-sedentary"],
   content:"一、整体收入水平\n200份有效问卷，覆盖一线到三线城市。全职老师月收入中位数1.2万，兼职老师0.4-0.8万。\n\n二、收入结构\n- 私教课：占比60%以上（核心收入来源）\n- 团课：约25%（稳定性好但单价低）\n- 其他（工作坊、线上课等）：约15%\n\n三、城市差异\n- 一线城市：全职月收入1.5-3万，头部老师5万+\n- 二线城市：全职月收入1-2万\n- 三线及以下：全职月收入0.6-1.2万\n\n四、收入提升关键因素\n1. 私教转化能力：直接决定收入上限\n2. 续费率：稳定收入的基础，续费率60%以上为健康水平\n3. 课程定价策略：修复类、孕产类等特色课程溢价明显\n4. 多场馆合作：与2-3个场馆合作比单场馆收入高40%",
   source:"在线问卷 + 行业社群数据",date:"2024-12",relatedTopics:["anatomy","sales"]},
  {id:"doc-sales-trust",title:"私教销售中的信任建立机制研究",category:"销售方法",
   tags:["scn-sales","scn-renew","scn-income"],
   content:"一、三种高效信任建立方式\n\n方式1：体验课转化\n- 提供1次免费或低价体验课（99-199元）\n- 体验课中重点展示专业度和个性化关注\n- 课后24小时内跟进报价\n- 平均转化率35%，远高于直接报价的8%\n\n方式2：专业内容输出\n- 在社交平台分享专业知识（短视频/图文）\n- 内容聚焦学员痛点：体态改善、疼痛缓解等\n- 建立专业形象后，学员主动咨询比例提升3倍\n\n方式3：口碑推荐\n- 老学员推荐新学员，给予双方优惠\n- 推荐来的学员转化率高达60%\n- 维护好核心学员关系，形成自然转介绍链\n\n二、销售常见误区\n- 硬推销触发防御心理，尤其对中高端学员\n- 过度承诺效果，后续续费率极低\n- 忽略课后跟进，学员感受不到持续关注\n\n三、报价技巧\n- 先建立价值感知，再谈价格\n- 提供多档选择（如10节/20节/30节），避免非此即彼\n- 强调长期效果而非单次体验",
   source:"消费行为研究 + 从业者经验总结",date:"2025-02",relatedTopics:["sales","retention"]},
  {id:"doc-retention-research",title:"私教学员续费影响因素分析",category:"续费研究",
   tags:["scn-renew","scn-income","scn-sales"],
   content:"一、三大续费驱动力\n\n驱动力1：身体变化感知\n- 学员能感受到身体变化是续费的首要原因\n- 关键做法：每4-6节课做一次进度反馈\n- 具体方法：拍照对比、体态评估数据、功能测试\n\n驱动力2：师生情感连接\n- 学员信任老师、喜欢上课氛围\n- 关键做法：记住学员个人情况，课后主动关心\n- 避免行为：敷衍教学、频繁换老师\n\n驱动力3：课堂体验\n- 课程有节奏感、有进步感\n- 关键做法：每节课有明确主题和小目标\n- 避免行为：课程内容重复、缺乏新意\n\n二、续费率数据\n- 续费率60%以上：健康水平，老师收入稳定\n- 续费率40-60%：需改善，重点关注课后跟进\n- 续费率40%以下：预警，需全面复盘教学和服务\n\n三、续费率60%以上老师的共性\n- 每月至少1次主动课后跟进\n- 每4-6节课做进度反馈\n- 课程内容有系统规划，非随意安排\n- 重视学员情感需求，而非只关注动作标准\n\n四、续费话术要点\n- 不在课上直接推销，课后单独沟通\n- 用进步数据说话，而非强调优惠\n- 给学员选择空间，而非施压",

  {id:"doc-org-review",title:"国内主流普拉提培训机构评测",category:"机构评测",

   content:"一、评测方法\n从课程体系、师资力量、实习安排、就业支持、性价比5个维度评测12家国内活跃的普拉提培训机构。\n\n二、梯队分布\n头部3家综合评分4.2+，中位6家3.0-3.8，尾部3家2.5以下。\n\n三、头部机构特征\n- 有国际认证体系背书（BASI/STOTT/Polestar授权）\n- 课程包含充足的实践课时（不少于总课时40%）\n- 提供毕业后就业推荐或实习机会\n- 校友网络活跃，持续学习资源丰富\n\n四、选机构核心指标\n1. 证书含金量：是否为国际认证授权培训点\n2. 实习教学安排：是否有真实教学实践环节\n3. 就业支持：毕业后是否推荐就业或实习\n4. 师资背景：主讲老师的从业年限和认证资质\n5. 性价比：课程费用与市场认可度的匹配度\n\n五、避坑指南\n- 警惕纯线上认证课程，市场认可度低\n- 警惕承诺「包就业」但无具体合作场馆的机构\n- 警惕课程时长过短（低于200小时）的认证项目\n- 优先选择可试听或可退费的机构",

   content:"一、孕早期（1-12周）\n- 以呼吸和放松为主，避免剧烈运动\n- 推荐练习：横膈膜呼吸、骨盆底肌感知训练\n- 禁忌动作：俯卧位、过度扭转、高强度核心训练\n\n二、孕中期（13-27周）\n- 可逐步增加轻度力量训练\n- 推荐练习：侧卧系列、站立体式、弹力带辅助训练\n- 禁忌动作：仰卧位（影响血液回流）、深度前屈\n\n三、孕晚期（28周-分娩）\n- 以维持身体机能和缓解不适为主\n- 推荐练习：分娩呼吸法、骨盆底肌训练、温和拉伸\n- 禁忌动作：平衡类动作（摔倒风险）、负重训练\n\n四、产后恢复（6周后）\n- 需经医生许可后开始\n- 第一阶段：骨盆底肌恢复+呼吸训练\n- 第二阶段：核心稳定+轻度力量\n- 第三阶段：逐步恢复正常训练强度\n\n五、教学注意事项\n- 必须了解学员孕周和身体状况\n- 每节课前确认身体感受\n- 准备替代动作，随时调整强度",

async function callGLM(messages, temperature, maxTokens) {
  const body = {model: "glm-4.7-flash", messages, temperature: temperature || 0.7, max_tokens: maxTokens || 3000};
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      const res = await fetch(GLM_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer " + GLM_KEY},
        body: JSON.stringify(body)
      });
      if (res.status === 429) {
        if (attempt < 3) { await new Promise(r => setTimeout(r, 5000)); continue; }
        throw new Error("429 限流，3次重试后仍失败");
      }
      if (!res.ok) throw new Error("API " + res.status);
      return (await res.json()).choices?.[0]?.message?.content ?? "";
    } catch (e) {
      if (attempt >= 3) throw e;
      await new Promise(r => setTimeout(r, 2000 * attempt));
    }
  }
}

async function callEmbedding(text) {
  const res = await fetch(EMBED_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json", "Authorization": "Bearer " + GLM_KEY},
    body: JSON.stringify({model: "embedding-3", input: text})
  });
  if (!res.ok) throw new Error("Embedding API " + res.status);
  const data = await res.json();
  return data.data?.[0]?.embedding ?? [];
}

async function callVision(imageBase64, prompt) {
  const res = await fetch(GLM_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json", "Authorization": "Bearer " + GLM_KEY},
    body: JSON.stringify({
      model: "glm-4v-flash",
      messages: [{role: "user", content: [{type: "image_url", image_url: {url: imageBase64}}, {type: "text", text: prompt || "请识别图片中的所有文字内容，包括手写文字，按原文格式输出。"}]}],
      temperature: 0.3, max_tokens: 2000
    })
  });
  if (!res.ok) throw new Error("Vision API " + res.status);
  return (await res.json()).choices?.[0]?.message?.content ?? "";
}

function cosineSimilarity(a, b) {
  if (!a.length || !b.length || a.length !== b.length) return 0;
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) || 1);
}

function detectScenarioType(q) {
  for (const rule of RULES.scenarioRules) {
    if (rule.type === "fuzzy") continue;
    if (rule.keywords.some(kw => q.includes(kw))) return rule;
  }
  return RULES.scenarioRules.find(r => r.type === "fuzzy");
}

function matchTopic(q) {
  for (const rule of RULES.topicRules) {
    if (rule.keywords.some(kw => q.includes(kw))) {
      const topic = TOPICS.find(t => t.id === rule.topicId);
      if (topic) return {type: "P0精确", topic, rule};
    }
  }
  for (const topic of TOPICS) {
    if (topic.questions && topic.questions.some(tq => {
      const overlap = tq.split("").filter(c => q.includes(c)).length;
      return overlap > tq.length * 0.4;
    })) return {type: "P0模糊", topic, rule: null};
  }
  return {type: "长尾AI", topic: null, rule: null};
}

function renderTagGroupStats(){
  const groups={};
  TAGS.forEach(t=>{if(!groups[t.group])groups[t.group]={total:0,front:0};groups[t.group].total++;if(t.showFront)groups[t.group].front++});
  const icons={"证书类型":"📋","身体部位":"🦴","人群特征":"👥","动作类别":"🎯","教学场景":"📚"};
  return Object.entries(groups).map(([g,v])=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f0ea">
      <span style="font-size:16px">${icons[g]||"📌"}</span>

    </div>`).join("");
}

let tempDims=[];
function dimEditHTML(d,i){
  return `<div class="dim-group" data-dim-idx="${i}">

}
function addDim(){
  const c=document.getElementById("et-dims");
  const idx=c.children.length;
  c.insertAdjacentHTML("beforeend",dimEditHTML({id:"dim_"+idx,label:"",options:[]},idx));
}

function saveTopic(id,isEdit){
  const label=document.getElementById("et-label").value.trim();
  if(!label){alert("请输入Topic名称");return}
  const dims=[];
  document.querySelectorAll("#et-dims .dim-group").forEach(g=>{
    const lbl=g.querySelector(".dim-label").value.trim();
    const opts=g.querySelector(".dim-options").value.split(",").map(s=>s.trim()).filter(Boolean);
    if(lbl)dims.push({id:"dim_"+uid(),label:lbl,options:opts});
  });
  const data={
    id:id,label:label,
    priority:parseInt(document.getElementById("et-priority").value)||TOPICS.length+1,
    intro:document.getElementById("et-intro").value.trim(),
    tags:document.getElementById("et-tags").value.split(",").map(s=>s.trim()).filter(Boolean),
    dimensions:dims,
    base:{
      conclusion:document.getElementById("et-conclusion").value.trim(),
      basis:document.getElementById("et-basis").value.split("\n").map(s=>s.trim()).filter(Boolean),
      source:document.getElementById("et-source").value.trim()
    },
    questions:document.getElementById("et-questions").value.split("\n").map(s=>s.trim()).filter(Boolean),
    docRefs:document.getElementById("et-docrefs").value.split(",").map(s=>s.trim()).filter(Boolean)
  };
  if(isEdit){TOPICS=TOPICS.map(t=>t.id===id?data:t)}else{TOPICS.push(data)}
  saveAll();closeModal();renderTopics();
}

function deleteTopic(id){
  if(!confirm("确定删除此Topic？"))return;
  TOPICS=TOPICS.filter(t=>t.id!==id);saveAll();renderTopics();
}

function saveTemplate(type){
  const tpl=TEMPLATES[type];
  tpl.description=document.getElementById("tpl-desc").value.trim();
  tpl.keywords=document.getElementById("tpl-kw").value.split(",").map(s=>s.trim()).filter(Boolean);
  tpl.secondaryLogic=document.getElementById("tpl-sec-logic").value.trim();
  tpl.systemPrompt=document.getElementById("tpl-sp").value.trim();
  tpl.userPrompt=document.getElementById("tpl-up").value.trim();
  const rows=document.querySelectorAll("#modal-content table tr");
  const newFields=[];
  rows.forEach((r,i)=>{if(i===0)return;
    const inputs=r.querySelectorAll("input,select");
    if(inputs.length<7)return;
    newFields.push({key:inputs[0].value.trim(),label:inputs[1].value.trim(),type:inputs[2].value,required:inputs[3].checked,secondary:inputs[4].checked,secondaryTrigger:inputs[5].value.trim(),desc:inputs[6].value.trim()});
  });
  if(newFields.length>0)tpl.fields=newFields;
  saveAll();closeModal();renderTemplates();
}

async function testPrompt(type){
  const tpl=TEMPLATES[type];
  const testQ=type==="judgment"?"解剖修复值得学吗":type==="comparison"?"普拉提和瑜伽哪个更好入行":"零基础怎么开始入行";
  openModal(`
    <h2>测试 Prompt：${esc(tpl.name)}</h2>
    <div class="form-row"><label>测试问题</label><input id="test-q" value="${esc(testQ)}"></div>
    <button class="btn btn-primary" onclick="runTest('${type}')" id="test-run-btn">运行测试</button>
    <div id="test-result" style="margin-top:12px"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>
  `);
}

async function runTest(type){
  const q=document.getElementById("test-q").value.trim();if(!q)return;
  const btn=document.getElementById("test-run-btn");btn.textContent="AI 生成中...";btn.disabled=true;
  const tpl=TEMPLATES[type];
  const userPrompt=tpl.userPrompt.replace("{query}",q);
  try{
    const raw=await callGLM([{role:"system",content:tpl.systemPrompt},{role:"user",content:userPrompt}]);
    document.getElementById("test-result").innerHTML=`<div class="test-result"><div style="font-weight:600;margin-bottom:8px">AI 返回结果：</div><pre style="white-space:pre-wrap;font-size:12px;line-height:1.6">${esc(raw)}</pre></div>`;
  }catch(e){
    document.getElementById("test-result").innerHTML=`<div class="test-result error">请求失败：${esc(e.message)}</div>`;
  }
  btn.textContent="运行测试";btn.disabled=false;
}

            <td><div class="toggle ${t.forSearch?'on':''}" onclick="toggleTagProp('${t.id}','forSearch',this)"></div></td>

function toggleTagProp(id,prop,el){
  const t=TAGS.find(x=>x.id===id);if(!t)return;
  t[prop]=!t[prop];el.classList.toggle("on",t[prop]);
  saveAll();
}

function addTag(){
  const groups=[...new Set(TAGS.map(t=>t.group))];
  openModal(`
    <h2>新增标签</h2>
    <div class="form-row"><label>标签名称</label><input id="nt-name"></div>

    <div class="form-row"><label>参与检索</label><div class="toggle on" id="nt-search" onclick="this.classList.toggle('on')"></div></div>

function saveNewTag(){
  const name=document.getElementById("nt-name").value.trim();if(!name){alert("请输入标签名");return}

  saveAll();closeModal();renderTags();

function deleteTag(id){if(!confirm("确定删除？"))return;TAGS=TAGS.filter(t=>t.id!==id);saveAll();renderTags()}

function saveEditDoc(id){
  const d=DOCS.find(x=>x.id===id);if(!d)return;
  d.title=document.getElementById("ed-title").value.trim();
  d.category=document.getElementById("ed-cat").value.trim();
  d.date=document.getElementById("ed-date").value.trim();
  d.tags=Array.from(document.querySelectorAll(".ed-tag-cb:checked")).map(cb=>cb.value);
  d.content=document.getElementById("ed-content").value.trim();
  d.source=document.getElementById("ed-source").value.trim();
  d.relatedTopics=document.getElementById("ed-topics").value.split(",").map(s=>s.trim()).filter(Boolean);
  saveAll();closeModal();renderDocs();
}

function deleteDoc(id){if(!confirm("确定删除？"))return;DOCS=DOCS.filter(d=>d.id!==id);saveAll();renderDocs()}

async function runPipeline(){
  const q=document.getElementById("pipe-input").value.trim();
  if(!q){alert("请输入问题");return}
  const btn=document.getElementById("pipe-run-btn");
  btn.disabled=true;btn.textContent="运行中...";
  const stepsEl=document.getElementById("pipe-steps");
  stepsEl.innerHTML="";
  const t0=Date.now();

  stepsEl.innerHTML+=`<div class="pipeline-step active" id="ps1"><div class="step-title"><span class="step-num">1</span>场景类型识别</div><div class="step-body">正在匹配关键词...</div></div>`;
  await new Promise(r=>setTimeout(r,300));
  const scenario=detectScenarioType(q);
  const matchedKw=scenario.type!=="fuzzy"?scenario.keywords.filter(k=>q.includes(k)):[];
  const s1=document.getElementById("ps1");
  s1.className="pipeline-step done";
  s1.querySelector(".step-body").innerHTML=`<strong>识别结果：</strong><span class="chip chip-${scenario.type==='comparison'?'terra':scenario.type==='judgment'?'sage':scenario.type==='action'?'blue':'gray'}">${esc(scenario.name)}</span>${matchedKw.length?`<br><strong>命中关键词：</strong>${matchedKw.map(k=>`<span class="chip chip-sm chip-gray">${esc(k)}</span>`).join(" ")}`:"<br>无关键词命中，使用默认兜底"}<br><strong>耗时：</strong>${Date.now()-t0}ms`;

  stepsEl.innerHTML+=`<div class="pipeline-arrow">↓</div>`;
  const t1=Date.now();
  stepsEl.innerHTML+=`<div class="pipeline-step active" id="ps2"><div class="step-title"><span class="step-num">2</span>Topic 匹配</div><div class="step-body">正在匹配P0 Topic...</div></div>`;
  await new Promise(r=>setTimeout(r,200));
  const topicMatch=matchTopic(q);
  const s2=document.getElementById("ps2");
  s2.className="pipeline-step done";
  if(topicMatch.topic){
    s2.querySelector(".step-body").innerHTML=`<strong>匹配方式：</strong><span class="chip chip-sm chip-sage">${esc(topicMatch.type)}</span><br><strong>匹配Topic：</strong>${esc(topicMatch.topic.label)}（P${topicMatch.topic.priority}）<br><strong>底座数据：</strong><span class="source-badge curated">行业整理</span> 结论+${topicMatch.topic.base.basis.length}条依据<br><strong>耗时：</strong>${Date.now()-t1}ms`;
  }else{
    s2.querySelector(".step-body").innerHTML=`<strong>匹配方式：</strong><span class="chip chip-sm chip-terra">长尾AI</span><br><strong>结果：</strong>未匹配到P0 Topic，将全AI生成并标注"AI推断·仅供参考"<br><strong>耗时：</strong>${Date.now()-t1}ms`;
  }

  stepsEl.innerHTML+=`<div class="pipeline-arrow">↓</div>`;
  const t2a=Date.now();
  stepsEl.innerHTML+=`<div class="pipeline-step active" id="ps2b"><div class="step-title"><span class="step-num">2.5</span>维度选择 → Prompt 注入</div><div class="step-body">正在模拟用户维度选择...</div></div>`;
  await new Promise(r=>setTimeout(r,150));
  const s2b=document.getElementById("ps2b");
  s2b.className="pipeline-step done";
  if(topicMatch.topic&&topicMatch.topic.dimensions&&topicMatch.topic.dimensions.length>0){
    const dimInfo=topicMatch.topic.dimensions.map(d=>`${esc(d.label)} → ${esc(d.options[0])}`).join("；");
    s2b.querySelector(".step-body").innerHTML=`<strong>维度数量：</strong>${topicMatch.topic.dimensions.length} 个<br><strong>模拟选择：</strong>${dimInfo}<br><strong>注入方式：</strong>维度信息作为上下文注入User Prompt，影响AI输出的个性化程度<br><strong>耗时：</strong>${Date.now()-t2a}ms`;
  }else{
    s2b.querySelector(".step-body").innerHTML=`<strong>维度数量：</strong>0 个（长尾场景无需维度选择）<br><strong>耗时：</strong>${Date.now()-t2a}ms`;
  }

  stepsEl.innerHTML+=`<div class="pipeline-arrow">↓</div>`;
  const t2=Date.now();
  stepsEl.innerHTML+=`<div class="pipeline-step active" id="ps3"><div class="step-title"><span class="step-num">3</span>模板渲染 + 数据注入</div><div class="step-body">正在组装Prompt...</div></div>`;
  await new Promise(r=>setTimeout(r,100));
  const tplType=scenario.type==="fuzzy"?"judgment":scenario.type;
  const tpl=TEMPLATES[tplType]||TEMPLATES.judgment;
  let systemPrompt=tpl.systemPrompt;
  let userPrompt=tpl.userPrompt.replace("{query}",q);
  if(topicMatch.topic&&topicMatch.topic.base){
    const b=topicMatch.topic.base;
    userPrompt=`底座数据——结论：${b.conclusion}；依据：${b.basis.join("；")}。\n`+userPrompt;
  }
  if(topicMatch.topic&&topicMatch.topic.dimensions&&topicMatch.topic.dimensions.length>0){
    const dimCtx=topicMatch.topic.dimensions.map(d=>`${d.label}：${d.options[0]}`).join("，");
    userPrompt=`用户情况：${dimCtx}。\n`+userPrompt;
  }
  const s3=document.getElementById("ps3");
  s3.className="pipeline-step done";
  s3.querySelector(".step-body").innerHTML=`<strong>使用模板：</strong><span class="chip chip-${tpl.color}">${esc(tpl.name)}</span><br><strong>数据来源：</strong>${topicMatch.topic?'<span class="source-badge curated">P0底座数据+AI润色</span>':'<span class="source-badge">全AI生成</span>'}<br><strong>次视角补充：</strong>${esc(tpl.secondaryLogic.slice(0,60))}...<br><strong>耗时：</strong>${Date.now()-t2}ms<div style="margin-top:8px"><div style="font-size:11px;color:var(--light);margin-bottom:2px">System Prompt</div><div class="prompt-box" style="font-size:10px;max-height:60px">${esc(systemPrompt)}</div><div style="font-size:11px;color:var(--light);margin:4px 0 2px">User Prompt（含底座数据注入）</div><div class="prompt-box" style="font-size:10px;max-height:80px">${esc(userPrompt)}</div></div>`;

  stepsEl.innerHTML+=`<div class="pipeline-arrow">↓</div>`;
  const t3=Date.now();
  stepsEl.innerHTML+=`<div class="pipeline-step active" id="ps4"><div class="step-title"><span class="step-num">4</span>AI 生成结构化输出</div><div class="step-body">正在调用 GLM-4.7-Flash...</div></div>`;
  try{
    const raw=await callGLM([{role:"system",content:systemPrompt},{role:"user",content:userPrompt}]);
    const s4=document.getElementById("ps4");
    s4.className="pipeline-step done";
    let parsed=null;
    try{let js=raw.trim();const cb=raw.match(/```(?:json)?\s*([\s\S]*?)```/);if(cb)js=cb[1].trim();else{const bm=raw.match(/\{[\s\S]*\}/);if(bm)js=bm[0]}parsed=JSON.parse(js)}catch(e){}
    s4.querySelector(".step-body").innerHTML=`<strong>模型：</strong>GLM-4.7-Flash<br><strong>耗时：</strong>${Date.now()-t3}ms<br><strong>格式合规：</strong>${parsed?'<span style="color:var(--sage)">✓ JSON解析成功</span>':'<span style="color:var(--terra)">✗ JSON解析失败</span>'}<br><strong>信息来源标注：</strong>${topicMatch.topic?'<span class="source-badge curated">行业整理</span>':'<span class="source-badge">AI推断·仅供参考</span>'}<div style="margin-top:8px"><div style="font-size:11px;color:var(--light);margin-bottom:2px">AI 原始输出</div><div class="prompt-box" style="font-size:10px;max-height:200px">${esc(raw.slice(0,2000))}</div></div>${parsed?`<div style="margin-top:8px"><div style="font-size:11px;color:var(--light);margin-bottom:2px">结构化解析结果</div><pre style="font-size:11px;background:var(--subtle);padding:10px;border-radius:8px;max-height:200px;overflow-y:auto;white-space:pre-wrap">${esc(JSON.stringify(parsed,null,2).slice(0,2000))}</pre></div>`:""}`;
  }catch(e){
    const s4=document.getElementById("ps4");
    s4.className="pipeline-step fail";
    s4.querySelector(".step-body").innerHTML=`<strong>请求失败：</strong>${esc(e.message)}<br><strong>耗时：</strong>${Date.now()-t3}ms`;
  }

  stepsEl.innerHTML+=`<div style="margin-top:12px;padding:10px 14px;background:var(--subtle);border-radius:8px;font-size:12px;color:var(--muted)"><strong>总耗时：</strong>${Date.now()-t0}ms ｜ <strong>架构验证：</strong>${topicMatch.topic?"P0底座数据+AI润色 → 高频场景质量可控":"长尾全AI生成 → 覆盖面广但标注风险"}</div>`;
  btn.disabled=false;btn.textContent="运行测试";
}

async function runEmbedCompare(){
  const a=document.getElementById("emb-a").value.trim();
  const b=document.getElementById("emb-b").value.trim();
  if(!a||!b)return;
  const btn=document.getElementById("emb-compare-btn");btn.textContent="对比中...";btn.disabled=true;
  try{
    const [vecA,vecB]=await Promise.all([callEmbedding(a),callEmbedding(b)]);
    const sim=cosineSimilarity(vecA,vecB);

    document.getElementById("emb-compare-result").innerHTML=`<div class="embed-result"><div style="font-size:11px;color:#7C5CBF;margin-bottom:4px">语义相似度：${pct}%</div><div class="similarity-bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div><div style="margin-top:8px;font-size:11px;color:var(--muted)">A向量维度：${vecA.length} ｜ B向量维度：${vecB.length}<br>判断：${sim>0.8?"高度相关——语义检索可匹配":sim>0.5?"中等相关——需结合关键词":"低相关——可能不是同一话题"}</div></div>`;

}

async function runEmbedTopic(){
  const q=document.getElementById("emb-topic-q").value.trim();if(!q)return;
  const btn=document.getElementById("emb-topic-btn");btn.textContent="匹配中...";btn.disabled=true;
  try{
    const qVec=await callEmbedding(q);
    const results=[];
    for(const topic of TOPICS){
      const tVec=await callEmbedding(topic.intro);
      const sim=cosineSimilarity(qVec,tVec);
      results.push({topic,sim});
    }
    results.sort((a,b)=>b.sim-a.sim);
    document.getElementById("emb-topic-result").innerHTML=`<div class="embed-result">${results.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:11px;color:var(--light);min-width:20px">#${i+1}</span><span style="font-size:13px;font-weight:500;min-width:80px">${esc(r.topic.label)}</span><div class="similarity-bar" style="flex:1"><div class="fill" style="width:${(r.sim*100).toFixed(1)}%;background:${i===0?"var(--sage)":"var(--blue)"}"></div></div><span style="font-size:12px;font-weight:600;color:${i===0?"var(--sage)":"var(--muted)"}">${(r.sim*100).toFixed(1)}%</span></div>`).join("")}<div style="margin-top:8px;font-size:11px;color:var(--muted)">最佳匹配：<strong style="color:var(--sage)">${esc(results[0].topic.label)}</strong>（相似度${(results[0].sim*100).toFixed(1)}%）</div></div>`;
  }catch(e){
    document.getElementById("emb-topic-result").innerHTML=`<div class="test-result error">请求失败：${esc(e.message)}</div>`;
  }
  btn.textContent="语义匹配";btn.disabled=false;
}

async function runRAGTest(){
  const q=document.getElementById("rag-q").value.trim();if(!q)return;
  const btn=document.getElementById("rag-btn");btn.textContent="检索中...";btn.disabled=true;
  const selectedTags=Array.from(document.querySelectorAll(".rag-tag-cb:checked")).map(cb=>cb.value);
  
  try{
    // Step 1: 语义召回 - 计算查询与所有文档内容的相似度
    const qVec=await callEmbedding(q);
    const candidates=[];
    for(const doc of DOCS){
      const docText=(doc.content||doc.summary||"").slice(0,500);
      if(!docText)continue;
      const dVec=await callEmbedding(docText);
      const sim=cosineSimilarity(qVec,dVec);
      candidates.push({doc,sim});
    }
    candidates.sort((a,b)=>b.sim-a.sim);
    
    // Step 2: 标签过滤（如果选了标签）
    let filtered=candidates;
    let filterInfo="";
    if(selectedTags.length>0){
      filtered=candidates.filter(c=>(c.doc.tags||[]).some(t=>selectedTags.includes(t)));
      filterInfo=`<div style="margin-bottom:10px;font-size:12px;color:var(--sage);background:var(--sage-pale);border-radius:6px;padding:8px 12px">🏷️ 标签过滤：已选${selectedTags.length}个标签，从${candidates.length}个候选中筛选出${filtered.length}个匹配文档</div>`;
    }
    
    // Step 3: 展示结果
    const topResults=filtered.slice(0,5);
    if(topResults.length===0){
      document.getElementById("rag-result").innerHTML=`<div class="test-result error">未找到相关文档${selectedTags.length>0?"，请尝试减少标签过滤条件":""}</div>`;
    }else{
      const resultHTML=topResults.map((r,i)=>{
        const tagChips=(r.doc.tags||[]).map(tid=>{const t=TAGS.find(x=>x.id===tid);return t?`<span class="chip chip-sm chip-sage">${esc(t.name)}</span>`:""}).join("");
        const matchTags=selectedTags.length>0?(r.doc.tags||[]).filter(t=>selectedTags.includes(t)):[];
        const matchTagChips=matchTags.map(tid=>{const t=TAGS.find(x=>x.id===tid);return t?`<span class="chip chip-sm chip-terra">${esc(t.name)}</span>`:""}).join("");
        return `<div style="background:var(--card);border:1px solid ${i===0?"var(--sage-border)":"var(--border)"};border-radius:10px;padding:14px;margin-bottom:8px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <div style="font-size:14px;font-weight:600">${i===0?"🥇":""} ${esc(r.doc.title)}</div>
            <span style="font-size:13px;font-weight:700;color:${r.sim>0.7?"var(--sage)":r.sim>0.5?"var(--terra)":"var(--muted)"}">${(r.sim*100).toFixed(1)}%</span>
          </div>
          <div style="margin-bottom:6px">${tagChips}</div>
          ${matchTagChips?`<div style="font-size:11px;color:var(--terra);margin-bottom:4px">命中标签：${matchTagChips}</div>`:""}
          <div style="font-size:12px;color:var(--muted);line-height:1.6;max-height:80px;overflow:hidden">${esc((r.doc.content||r.doc.summary||"").slice(0,200))}...</div>
        </div>`;
      }).join("");
      
      document.getElementById("rag-result").innerHTML=`
        ${filterInfo}
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">📊 语义召回${candidates.length}个文档${selectedTags.length>0?` → 标签过滤后${filtered.length}个`:""} → 展示TOP ${topResults.length}</div>
        ${resultHTML}
        <div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.7">
          <strong>RAG注入预览：</strong>排名第1的文档内容将作为上下文注入AI Prompt，<br>
          帮助AI基于真实行业知识生成回答，而非凭空编造。
        </div>`;
    }
  }catch(e){
    document.getElementById("rag-result").innerHTML=`<div class="test-result error">检索失败：${esc(e.message)}</div>`;
  }
  btn.textContent="执行RAG检索";btn.disabled=false;
}

let ocrBase64="";
function renderOCR(){
  const m=document.getElementById("main-content");
  m.innerHTML=`
  <div class="page-header"><h1>图片识别测试</h1><p>使用 GLM-4V-Flash 进行图片OCR识别，支持手写文字（知识库项目核心能力）</p></div>
  <div class="page-body">
    <div class="card" style="margin-bottom:16px;padding:14px 18px;background:var(--amber-pale);border-color:var(--amber-border)">
      <div style="font-size:12px;color:#8B6914;line-height:1.7">
        <strong>应用场景：</strong>知识库项目中，老师上传培训笔记照片后，GLM-4V-Flash 负责OCR识别（包括手写），<br>
        识别结果再交给文本大模型按结构化模板提炼成知识卡片。免费模型，约5-10秒完成识别。
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">📷 上传图片</div>
        <div class="ocr-drop" id="ocr-drop" onclick="document.getElementById('ocr-file').click()">
          <div style="font-size:28px;margin-bottom:8px">📁</div>
          <div style="font-size:13px;color:var(--muted)">点击选择图片或拖拽到此处</div>
          <div style="font-size:11px;color:var(--light);margin-top:4px">支持 JPG / PNG / WEBP</div>
        </div>
        <input type="file" id="ocr-file" accept="image/*" style="display:none" onchange="handleOCRFile(this)">
        <div id="ocr-preview" style="margin-top:10px"></div>
        <div class="form-row" style="margin-top:10px"><label>识别提示词（可选）</label><textarea id="ocr-prompt" rows="2">请识别图片中的所有文字内容，包括手写文字，按原文格式输出。</textarea></div>
        <button class="btn btn-primary" onclick="runOCR()" id="ocr-run-btn" disabled>开始识别</button>
      </div>
      <div class="card">
        <div class="card-title">📝 识别结果</div>
        <div id="ocr-result" style="min-height:200px"><div class="empty-state"><p>上传图片后点击"开始识别"</p></div></div>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-title">📋 OCR → 知识卡片 流程说明</div>
      <table style="font-size:12px">
        <tr><th>步骤</th><th>处理</th><th>模型</th><th>耗时</th></tr>
        <tr><td>1. 图片上传</td><td>前端读取为 Base64</td><td>-</td><td>&lt; 1s</td></tr>
        <tr><td>2. OCR识别</td><td>图片→文字（含手写）</td><td>GLM-4V-Flash</td><td>5-10s</td></tr>
        <tr><td>3. 结构化提炼</td><td>文字→知识卡片模板</td><td>GLM-4.7-Flash</td><td>10-15s</td></tr>
        <tr><td>4. 语义向量化</td><td>卡片内容→向量</td><td>Embedding-3</td><td>2-3s</td></tr>
        <tr><td>5. 关联检测</td><td>与历史笔记做相似度匹配</td><td>余弦相似度</td><td>&lt; 1s</td></tr>
      </table>
      <div style="font-size:11px;color:var(--light);margin-top:8px">总耗时约20-30秒，用户无需等待，完成后站内通知</div>
    </div>
  </div>`;
  const drop=document.getElementById("ocr-drop");
  drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("dragover")});
  drop.addEventListener("dragleave",()=>drop.classList.remove("dragover"));
  drop.addEventListener("drop",e=>{e.preventDefault();drop.classList.remove("dragover");if(e.dataTransfer.files.length)handleOCRFileObj(e.dataTransfer.files[0])});
}

function handleOCRFile(input){if(input.files.length)handleOCRFileObj(input.files[0])}
function handleOCRFileObj(file){
  const reader=new FileReader();
  reader.onload=function(e){
    ocrBase64=e.target.result;
    document.getElementById("ocr-preview").innerHTML=`<img src="${ocrBase64}" class="ocr-preview" alt="preview"><div style="font-size:11px;color:var(--muted);margin-top:4px">${esc(file.name)} (${(file.size/1024).toFixed(1)}KB)</div>`;
    document.getElementById("ocr-run-btn").disabled=false;
  };
  reader.readAsDataURL(file);
}

async function runOCR(){
  if(!ocrBase64){alert("请先上传图片");return}
  const btn=document.getElementById("ocr-run-btn");btn.textContent="识别中...";btn.disabled=true;
  document.getElementById("ocr-result").innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:24px;margin-bottom:8px">⏳</div><div style="font-size:13px;color:var(--muted)">GLM-4V-Flash 正在识别，通常需要 5-10 秒...</div></div>`;
  const prompt=document.getElementById("ocr-prompt").value.trim();
  try{
    const result=await callVision(ocrBase64,prompt);
    document.getElementById("ocr-result").innerHTML=`<div class="test-result"><div style="font-weight:600;margin-bottom:8px">识别结果：</div><div style="white-space:pre-wrap;font-size:13px;line-height:1.8">${esc(result)}</div></div><div style="margin-top:10px"><button class="btn btn-sm btn-outline" onclick="saveOCRAsDoc()">保存为知识文档</button></div>`;
  }catch(e){
    document.getElementById("ocr-result").innerHTML=`<div class="test-result error">识别失败：${esc(e.message)}</div>`;
  }
  btn.textContent="开始识别";btn.disabled=false;
}

function saveOCRAsDoc(){
  const resultEl=document.querySelector("#ocr-result .test-result div:last-child");
  if(!resultEl)return;
  const content=resultEl.textContent;
  DOCS.push({id:"doc_"+uid(),title:"OCR识别结果 - "+new Date().toLocaleDateString(),category:"OCR识别",summary:content.slice(0,200),source:"GLM-4V-Flash OCR识别",date:new Date().toISOString().slice(0,7),relatedTopics:[]});
  saveAll();alert("已保存到知识文档库");
}

function renderExport(){
  const m=document.getElementById("main-content");
  const frontTags=TAGS.filter(t=>t.showFront);
  m.innerHTML=`
  <div class="page-header"><h1>数据导出</h1><p>将后台管理的数据导出为前端原型可用的格式</p></div>
  <div class="page-body">
    <div class="card" style="margin-bottom:16px;padding:14px 18px;background:var(--sage-pale);border-color:var(--sage-border)">
      <div style="font-size:12px;color:#3D6B40;line-height:1.7">
        <strong>导出说明：</strong>导出的数据文件可供 AI分析师前端原型 引入，实现"后台编辑 → 导出 → 前端生效"的闭环。<br>
        MVP阶段使用 localStorage + JSON 文件方式，后续可接入后端API实现实时同步。
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="stat-box"><div class="label">Topic 数据</div><div class="value">${TOPICS.length}</div><div class="sub">含底座数据+维度+关联问题</div></div>
      <div class="stat-box sage"><div class="label">标签数据</div><div class="value">${TAGS.length}</div><div class="sub">前端展示 ${frontTags.length} 个</div></div>
      <div class="stat-box terra"><div class="label">模板数据</div><div class="value">3</div><div class="sub">选择判断+对比评估+方法行动</div></div>
      <div class="stat-box blue"><div class="label">规则数据</div><div class="value">${RULES.scenarioRules.length + RULES.topicRules.length}</div><div class="sub">场景识别+Topic匹配</div></div>
    </div>
    <div class="card">
      <div class="card-title">导出为 JSON 文件</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">导出所有后台数据为一个 JSON 文件，前端原型可通过 <code>&lt;script src="analyst-data.js"&gt;</code> 引入</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="exportJSON()">导出完整数据 (JSON)</button>
        <button class="btn btn-outline" onclick="exportFrontendData()">仅导出前端所需数据</button>
        <button class="btn btn-outline" onclick="previewExportData()">预览导出内容</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">重置数据</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">将所有后台数据恢复为初始默认值（慎用）</p>
      <button class="btn btn-danger" onclick="resetAllData()">重置为默认数据</button>
    </div>
  </div>`;
}

function getExportData(frontOnly){
  if(frontOnly){
    return {
      topics:TOPICS.map(t=>({
        id:t.id,label:t.label,intro:t.intro,
        tags:t.tags.filter(tg=>TAGS.find(x=>x.name===tg&&x.showFront)),
        dimensions:t.dimensions,
        base:t.base,
        questions:t.questions
      })),
      tags:TAGS.filter(t=>t.showFront).map(t=>({name:t.name,group:t.group})),
      rules:{
        scenarioRules:RULES.scenarioRules.map(r=>({type:r.type,keywords:r.keywords})),
        topicRules:RULES.topicRules.map(r=>({topicId:r.topicId,keywords:r.keywords}))
      }
    };
  }
  return {topics:TOPICS,tags:TAGS,templates:TEMPLATES,rules:RULES,docs:DOCS,exportTime:new Date().toISOString()};
}

function exportJSON(){
  const data=getExportData(false);
  const blob=new Blob(["const ANALYST_DATA = "+JSON.stringify(data,null,2)],{type:"application/javascript"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="analyst-data.js";a.click();
}

function exportFrontendData(){
  const data=getExportData(true);
  const blob=new Blob(["const ANALYST_FRONTEND_DATA = "+JSON.stringify(data,null,2)],{type:"application/javascript"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="analyst-frontend-data.js";a.click();
}

function previewExportData(){
  const data=getExportData(false);
  openModal(`
    <h2>预览导出数据</h2>
    <div class="prompt-box" style="max-height:500px;font-size:11px;line-height:1.5">${esc(JSON.stringify(data,null,2).slice(0,5000))}${JSON.stringify(data).length>5000?"\n\n... (内容过长，已截断)":""}</div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>
  `);
}

function resetAllData(){
  if(!confirm("确定重置所有数据为默认值？此操作不可恢复！"))return;
  localStorage.removeItem("analyst_tags");localStorage.removeItem("analyst_topics");
  localStorage.removeItem("analyst_templates");localStorage.removeItem("analyst_rules");
  localStorage.removeItem("analyst_docs");
  TAGS=JSON.parse(JSON.stringify(DEFAULT_TAGS));TOPICS=JSON.parse(JSON.stringify(DEFAULT_TOPICS));
  TEMPLATES=JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));RULES=JSON.parse(JSON.stringify(DEFAULT_RULES));
  DOCS=JSON.parse(JSON.stringify(DEFAULT_DOCS));saveAll();renderExport();
}
