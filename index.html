<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>请查收，一段被宇宙偷偷存档的缘分</title>
<style>
/* =========================================================
   变量
   ========================================================= */
:root {
  --space-0: #01030a;
  --space-1: #050a1c;
  --silver: #eef1ff;
  --silver-dim: rgba(238, 241, 255, 0.72);
  --mist: rgba(238, 241, 255, 0.38);
  --silver-blue: #cfdcff;
  --warm-gold: #f6d98c;
  --warm-gold-soft: rgba(246, 217, 140, 0.55);

  --font-sans: "PingFang SC", "Microsoft YaHei", "Segoe UI",
               -apple-system, BlinkMacSystemFont, sans-serif;
  --font-hand: "华文行楷", "STXingkai", "华文楷体", "STKaiti",
               "楷体", "KaiTi", "Kaiti SC",
               "Segoe Script", "Lucida Handwriting", serif;
}

* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: #01020a;
  color: var(--silver);
  font-family: var(--font-sans);
  font-weight: 300;
  letter-spacing: 0.03em;
  overflow: hidden;
}
body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 90% 60% at 50% 22%, #0c1538 0%, #050a1e 48%, #01020a 85%);
}

/* 允许最终阶段解锁纵向滚动（若内容超出） */
body.final { overflow-y: auto; }

/* =========================================================
   背景：星云 + canvas 星场 + 远方轨道
   ========================================================= */
.sky { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.nebula {
  position: absolute; inset: -10%;
  background:
    radial-gradient(ellipse 40% 28% at 15% 18%, rgba(130, 100, 220, 0.16), transparent 60%),
    radial-gradient(ellipse 42% 30% at 86% 78%, rgba(60, 110, 210, 0.14), transparent 60%),
    radial-gradient(ellipse 60% 36% at 50% 108%, rgba(220, 170, 110, 0.05), transparent 65%);
  filter: blur(10px);
  animation: breathe 14s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.7; transform: scale(1); }
  50%     { opacity: 1;   transform: scale(1.04); }
}
#stars-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

.far-orbit {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 120vmin; height: 120vmin;
  border: 1px solid rgba(255,255,255,0.025);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}
.far-orbit::after {
  content: ''; position: absolute; inset: 12%;
  border: 1px solid rgba(255,255,255,0.018);
  border-radius: 50%;
}

/* =========================================================
   顶部极细标题
   ========================================================= */
.top-header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 34px 20px 18px;
  text-align: center;
  pointer-events: none;
}
.title {
  font-family: var(--font-sans);
  font-weight: 200;
  font-size: clamp(12px, 1.3vw, 15px);
  letter-spacing: 0.6em;
  padding-left: 0.6em;
  color: rgba(238, 241, 255, 0.85);
  opacity: 0;
  animation: softIn 2s ease 0.5s forwards;
}
.title .sep {
  display: inline-block; margin: 0 14px;
  color: var(--warm-gold);
  transform: translateY(-2px);
  text-shadow: 0 0 10px var(--warm-gold-soft);
  font-size: 0.8em;
}
@keyframes softIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 顶部引导小字（初始可见，点第一个后柔和隐去） */
.intro {
  margin-top: 14px;
  font-family: var(--font-hand);
  font-size: clamp(13px, 1.4vw, 16px);
  line-height: 2.1;
  color: var(--silver-dim);
  letter-spacing: 0.1em;
  opacity: 0;
  animation: softIn 2s ease 1.6s forwards;
  transition: opacity 1.4s ease;
}
.intro .em { color: #fff; }
.intro.hide { opacity: 0 !important; pointer-events: none; }

/* =========================================================
   主舞台：中央画框 + 7 个漂浮物件
   ========================================================= */
.stage {
  position: fixed; inset: 0;
  z-index: 2;
  pointer-events: none;
}

/* 中央画框 —— 首屏的主角 */
.frame-stage {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  height: min(72vh, 680px);
  aspect-ratio: 3 / 4;
  max-width: 52vw;
  perspective: 2400px;
  pointer-events: auto;
}

.frame {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transform: rotateY(9deg) rotateX(-5deg) rotateZ(-1.8deg);
  animation: frameBreath 16s ease-in-out infinite;
  filter:
    drop-shadow(0 36px 70px rgba(0,0,0,0.75))
    drop-shadow(0 0 80px rgba(90, 120, 220, 0.14));
  padding: clamp(12px, 1.6vw, 20px);
  border-radius: 8px;
  background:
    linear-gradient(135deg, #2a2318 0%, #0f0a05 42%, #1c150d 100%);
}
@keyframes frameBreath {
  0%,100% { transform: rotateY(9deg)   rotateX(-5deg)   rotateZ(-1.8deg); }
  50%     { transform: rotateY(10.6deg) rotateX(-5.8deg) rotateZ(-2.2deg) translateY(-4px); }
}
/* 内凹与金丝 */
.frame::before {
  content: ''; position: absolute; inset: 7px;
  border-radius: 4px;
  background: #040610;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04),
              inset 0 0 26px rgba(0,0,0,0.85);
}
.frame::after {
  content: ''; position: absolute; inset: 4px;
  border: 1px solid rgba(246, 217, 140, 0.14);
  border-radius: 5px;
  pointer-events: none;
}

/* 画面容器 */
.canvas {
  position: absolute;
  inset: clamp(12px, 1.6vw, 20px);
  border-radius: 3px;
  overflow: hidden;
  background: #000;
}

/* 真实礼物图 —— 逐步从雾里浮出 */
.frame-image {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  filter: blur(14px) brightness(0.3);
  transition: filter 2.4s cubic-bezier(0.25, 0.6, 0.3, 1);
}
.frame-dim {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 44%, rgba(0,0,0,0.88) 12%, rgba(0,0,0,0.98) 80%);
  opacity: 0.98;
  transition: opacity 2.4s cubic-bezier(0.25, 0.6, 0.3, 1);
  pointer-events: none;
}
.frame-iris {
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 44%,
    rgba(255, 240, 200, 0.3)  0%,
    rgba(180, 210, 255, 0.16) 26%,
    transparent 55%);
  transform: scale(0.25);
  opacity: 0;
  transition: transform 2.4s cubic-bezier(0.25, 0.6, 0.3, 1), opacity 2.4s ease;
  mix-blend-mode: screen;
  pointer-events: none;
}
.sweep {
  position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 0%, transparent 38%,
    rgba(255,255,255,0.28) 50%, transparent 62%, transparent 100%);
  transform: translateX(-110%);
  opacity: 0;
  pointer-events: none;
  mix-blend-mode: screen;
}
.sweep.run { animation: sweepMove 1.8s ease; }
@keyframes sweepMove {
  0%   { transform: translateX(-110%); opacity: 0; }
  25%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { transform: translateX(110%); opacity: 0; }
}

/* 画框外一圈极柔的辉光（呼吸） */
.frame-stage::before {
  content: '';
  position: absolute; inset: -8%;
  border-radius: 12px;
  background: radial-gradient(ellipse at center,
    rgba(180, 200, 255, 0.12), transparent 60%);
  z-index: -1;
  filter: blur(20px);
  animation: breathe 14s ease-in-out infinite;
  pointer-events: none;
}

/* =========================================================
   漂浮记忆物件 —— 纯线稿，非按钮
   ========================================================= */
.item {
  position: absolute;
  color: var(--silver-blue);
  cursor: pointer;
  pointer-events: auto;
  transition: color .4s ease, transform .5s cubic-bezier(0.2, 0.8, 0.3, 1),
              filter .5s ease, opacity 1s ease;
  animation: floatY var(--float-t, 6s) ease-in-out infinite;
  animation-delay: var(--float-d, 0s);
  filter: drop-shadow(0 0 6px rgba(180, 210, 255, 0.35));
  z-index: 5;
}
.item svg {
  display: block;
  width: var(--item-size, 72px);
  height: var(--item-size, 72px);
}
@keyframes floatY {
  0%,100% { transform: translateY(0) rotate(var(--tilt, 0deg)); }
  50%     { transform: translateY(-10px) rotate(calc(var(--tilt, 0deg) + 1.5deg)); }
}

.item:hover {
  color: #fff;
  filter: drop-shadow(0 0 10px rgba(255, 250, 220, 0.85))
          drop-shadow(0 0 22px rgba(246, 217, 140, 0.45));
  transform: scale(1.12) rotate(var(--tilt, 0deg));
  animation-play-state: paused;
}
.item:hover .item-tip {
  opacity: 1;
  transform: translate(-50%, -4px);
}

/* 深度分层（近 / 中 / 远） */
.item[data-depth="near"] { opacity: 1; }
.item[data-depth="mid"]  { opacity: 0.88; }
.item[data-depth="far"]  { opacity: 0.62;
  filter: drop-shadow(0 0 4px rgba(180, 210, 255, 0.22)) blur(0.3px); }

/* 提示小标签（hover 时淡出） */
.item-tip {
  position: absolute;
  left: 50%; bottom: -26px;
  transform: translate(-50%, 4px);
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.3em;
  padding-left: 0.3em;
  color: var(--warm-gold);
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease, transform .35s ease;
  white-space: nowrap;
}

/* 归档态：柔和保留 + 金色徽记 */
.item.archived {
  color: rgba(207, 220, 255, 0.55);
  cursor: default;
  filter: drop-shadow(0 0 4px rgba(180, 210, 255, 0.2));
}
.item.archived::after {
  content: '✦';
  position: absolute;
  top: -8px; right: -4px;
  font-family: serif;
  font-size: 13px;
  color: var(--warm-gold);
  text-shadow: 0 0 10px var(--warm-gold-soft);
}
.item.archived:hover {
  transform: scale(1) rotate(var(--tilt, 0deg));
  filter: drop-shadow(0 0 4px rgba(180, 210, 255, 0.2));
}
.item.pulsing { animation: itemPulse .9s ease; }
@keyframes itemPulse {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.35);
         filter: drop-shadow(0 0 16px rgba(255, 250, 220, 1))
                 drop-shadow(0 0 40px rgba(246, 217, 140, 0.7)); }
  100% { transform: scale(1); }
}

/* 当卡片打开时，其它物件略退开 */
.stage.has-card .item:not(.pulsing):not(.archived) {
  opacity: calc(var(--base-op, 1) * 0.65);
}

/* —— 7 个物件的位置（非对称，有远近）—— */
.item.i-1 { top: 18vh; left: 13vw; --item-size: 78px; --float-t: 6.4s; --tilt: -3deg; }
.item.i-2 { top: 16vh; left: 78vw; --item-size: 62px; --float-t: 7.2s; --float-d: .6s; --tilt: 4deg; }
.item.i-3 { top: 60vh; left: 9vw;  --item-size: 54px; --float-t: 5.6s; --float-d: 1.2s; --tilt: -2deg; }
.item.i-4 { top: 44vh; left: 84vw; --item-size: 72px; --float-t: 6.8s; --float-d: .9s; --tilt: 3deg; }
.item.i-5 { top: 74vh; left: 18vw; --item-size: 74px; --float-t: 7.4s; --float-d: 1.5s; --tilt: 0deg; }
.item.i-6 { top: 78vh; left: 78vw; --item-size: 60px; --float-t: 6.0s; --float-d: .3s; --tilt: -4deg; }
.item.i-7 { top: 8vh;  left: 56vw; --item-size: 44px; --float-t: 5.4s; --float-d: 1.8s; --tilt: 2deg; }

/* =========================================================
   记忆卡片 —— 宇宙里的玻璃标签
   ========================================================= */
.memory-card {
  position: fixed;
  width: clamp(280px, 24vw, 340px);
  padding: 20px 22px 22px;
  border-radius: 10px;
  background: linear-gradient(160deg,
    rgba(18, 24, 48, 0.55),
    rgba(8, 12, 28, 0.72));
  border: 1px solid rgba(238, 241, 255, 0.1);
  box-shadow:
    0 20px 50px rgba(0, 0, 0, 0.55),
    inset 0 0 0 1px rgba(255, 255, 255, 0.04),
    0 0 30px rgba(110, 140, 220, 0.12);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  opacity: 0;
  transform: translateY(10px) scale(0.96);
  transition: opacity .9s ease, transform .9s cubic-bezier(0.2, 0.8, 0.3, 1);
  pointer-events: none;
  z-index: 20;
}
.memory-card::before {
  content: '';
  position: absolute; top: -1px; left: 12%; right: 12%; height: 1px;
  background: linear-gradient(to right,
    transparent, rgba(246, 217, 140, 0.5), transparent);
}
.memory-card.shown {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.mc-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px dashed rgba(238, 241, 255, 0.12);
}
.mc-icon {
  width: 34px; height: 34px;
  color: var(--warm-gold);
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px var(--warm-gold-soft));
}
.mc-icon svg { width: 100%; height: 100%; }
.mc-num {
  font-family: var(--font-sans);
  font-weight: 200;
  font-size: 22px;
  letter-spacing: 0.1em;
  color: var(--warm-gold);
  line-height: 1;
}
.mc-tag {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.3em;
  padding-left: 0.3em;
  color: var(--silver-dim);
  margin-top: 3px;
}
.mc-body {
  font-family: var(--font-hand);
  font-size: 17px;
  line-height: 1.95;
  color: var(--silver);
  letter-spacing: 0.04em;
}
.mc-body p { margin-bottom: 2px; }
.mc-body b { color: #fff; font-weight: normal;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.4); }
.mc-egg {
  display: block;
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px dashed rgba(238, 241, 255, 0.08);
  font-family: var(--font-hand);
  font-size: 13.5px;
  line-height: 1.8;
  color: var(--mist);
  letter-spacing: 0.02em;
}

/* =========================================================
   进度器 —— 克制的角落
   ========================================================= */
.progress {
  position: fixed; top: 24px; right: 26px;
  z-index: 40;
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  font-family: var(--font-sans);
  font-weight: 300;
  opacity: 0;
  animation: softIn 2s ease 2.4s forwards;
}
.progress .prog-label {
  font-size: 10px;
  letter-spacing: 0.45em;
  padding-left: 0.45em;
  color: var(--mist);
}
.progress .prog-dots { display: flex; gap: 5px; }
.progress .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(238, 241, 255, 0.18);
  transition: all .8s ease;
}
.progress .dot.on {
  background: var(--warm-gold);
  box-shadow: 0 0 8px var(--warm-gold-soft);
}

/* =========================================================
   最终揭晓
   ========================================================= */
.finale {
  position: fixed; inset: 0;
  z-index: 30;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 20px 10vh;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2.2s ease;
}
.finale.show { opacity: 1; }
.finale-main {
  font-family: var(--font-sans);
  font-weight: 200;
  font-size: clamp(20px, 2.8vw, 32px);
  letter-spacing: 0.38em;
  padding-left: 0.38em;
  color: #fff;
  text-shadow:
    0 0 20px rgba(255, 255, 255, 0.55),
    0 0 50px rgba(246, 217, 140, 0.4);
  animation: finaleGlow 4.2s ease-in-out infinite;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 2.4s ease 0.4s, transform 2.4s ease 0.4s;
  text-align: center;
}
.finale.show .finale-main { opacity: 1; transform: translateY(0); }
@keyframes finaleGlow {
  0%,100% { text-shadow: 0 0 18px rgba(255,255,255,0.45), 0 0 50px rgba(246, 217, 140, 0.32); }
  50%     { text-shadow: 0 0 28px rgba(255,255,255,0.85), 0 0 80px rgba(246, 217, 140, 0.6); }
}
.finale-wish {
  margin-top: 26px;
  font-family: var(--font-hand);
  font-size: clamp(14px, 1.6vw, 17px);
  line-height: 2.1;
  color: var(--silver-dim);
  letter-spacing: 0.08em;
  text-align: center;
  max-width: 560px;
  opacity: 0;
  transition: opacity 2.4s ease 2.4s;
}
.finale.show .finale-wish { opacity: 1; }

/* 右下彩蛋 */
.easter {
  position: fixed;
  bottom: 22px; right: 24px;
  max-width: 260px;
  font-family: var(--font-hand);
  font-size: 12.5px;
  line-height: 1.85;
  letter-spacing: 0.02em;
  color: rgba(238, 241, 255, 0.38);
  text-align: right;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2.2s ease;
}
.easter.show { opacity: 1; }

/* =========================================================
   粒子 / 流星
   ========================================================= */
.shooting-star {
  position: fixed;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px #fff, 0 0 18px var(--warm-gold-soft);
  pointer-events: none;
  z-index: 60;
}
.shooting-star::after {
  content: '';
  position: absolute; right: 100%; top: 50%;
  width: 30px; height: 1px;
  background: linear-gradient(to left, rgba(255,255,255,0.85), transparent);
  transform: translateY(-50%);
}
.dust {
  position: fixed;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 6px var(--warm-gold-soft);
  pointer-events: none;
  z-index: 55;
}

/* 终极签名星（落在画框内） */
.signature-star {
  position: absolute;
  top: 44%; left: 50%;
  width: 12px; height: 12px;
  margin: -6px 0 0 -6px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 14px #fff, 0 0 32px rgba(255, 240, 180, 0.95),
              0 0 70px rgba(246, 217, 140, 0.75);
  opacity: 0;
  transform: scale(0.3);
  transition: all 2.2s cubic-bezier(0.25, 0.6, 0.3, 1);
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 3;
}
.signature-star::before,
.signature-star::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.9), transparent);
  transform: translate(-50%, -50%);
}
.signature-star::before { width: 1px; height: 44px; }
.signature-star::after  { width: 44px; height: 1px; }
body.final .signature-star {
  opacity: 1; transform: scale(1);
  animation: sigPulse 3.2s ease-in-out 2.2s infinite;
}
@keyframes sigPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

/* 初始黑幕 */
.page-mask {
  position: fixed; inset: 0; background: #000;
  z-index: 999; pointer-events: none;
  animation: pageReveal 2s ease forwards;
}
@keyframes pageReveal { 0% { opacity: 1; } 100% { opacity: 0; } }

/* =========================================================
   响应式
   ========================================================= */
@media (max-width: 820px) {
  body { overflow-y: auto; }
  .top-header { position: static; padding: 24px 14px 14px; }
  .stage { position: relative; height: auto; min-height: 140vh; }
  .frame-stage {
    position: relative; top: auto; left: auto;
    transform: none;
    margin: 20px auto 0;
    height: 54vh;
    max-width: 80vw;
  }
  .frame { transform: rotateY(6deg) rotateX(-3deg) rotateZ(-1deg); }
  @keyframes frameBreath {
    0%,100% { transform: rotateY(6deg)   rotateX(-3deg)   rotateZ(-1deg); }
    50%     { transform: rotateY(7.4deg) rotateX(-3.6deg) rotateZ(-1.4deg) translateY(-3px); }
  }
  .item { position: absolute; }
  .item.i-1 { top: 58vh; left: 6vw;  --item-size: 56px; }
  .item.i-2 { top: 58vh; left: 78vw; --item-size: 50px; }
  .item.i-3 { top: 98vh; left: 6vw;  --item-size: 46px; }
  .item.i-4 { top: 80vh; left: 80vw; --item-size: 54px; }
  .item.i-5 { top: 116vh; left: 12vw; --item-size: 56px; }
  .item.i-6 { top: 110vh; left: 72vw; --item-size: 46px; }
  .item.i-7 { top: 50vh; left: 45vw; --item-size: 38px; }
  .memory-card { width: 84vw; max-width: 360px; }
  .progress { top: 14px; right: 14px; }
  .easter { bottom: 12px; right: 14px; max-width: 220px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- 初始黑幕 -->
<div class="page-mask"></div>

<!-- 背景：星云 + 星场 + 远方轨道 -->
<div class="sky" aria-hidden="true">

(function starfield() {
  const cvs = document.getElementById('stars-canvas');
  const ctx = cvs.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = cvs.width  = window.innerWidth  * devicePixelRatio;
    H = cvs.height = window.innerHeight * devicePixelRatio;
    cvs.style.width  = window.innerWidth  + 'px';
    cvs.style.height = window.innerHeight + 'px';
    const count = Math.floor((W * H) / (devicePixelRatio * 14000));
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.3 * devicePixelRatio + 0.25,
        base: Math.random() * 0.5 + 0.28,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.013 + 0.004,
        hue: Math.random() < 0.12 ? 'warm' : (Math.random() < 0.28 ? 'blue' : 'white')
      });
    }
  }
  window.addEventListener('resize', resize);
  resize();

  function loop(t) {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      const a = s.base + Math.sin(t * s.speed + s.phase) * 0.4;
      ctx.globalAlpha = Math.max(0, Math.min(1, a));
      ctx.fillStyle = s.hue === 'warm' ? '#f6d98c'
                   : s.hue === 'blue' ? '#b4c8ff' : '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

function handleClick(index, el) {
  if (state.unlocked[index]) return;
  if (index !== state.step) return;     // 仅按顺序，但不提示（物件 hover 发光足够自然引导）

  state.unlocked[index] = true;
  state.step = index + 1;

  // 1. 物件脉冲归档
  el.classList.add('pulsing');
  setTimeout(() => {
    el.classList.remove('pulsing');
    el.classList.add('archived');

  // 3. 从物件飞向画框中心的细星尘

  // 6. 进度

  // 7. 引导小字柔和隐去

  // 8. 全部完成 → 终极
  if (state.step === 7 && !state.finaled) {
    state.finaled = true;
    setTimeout(triggerFinale, 2200);
  }
}

  { dim: 0.00, iris: {s: 1.80, o: 0.25}, blur: 0,   br: 1.06 }, // 7
];
function updateFrameReveal(step) {
  const v = revealSteps[step] || revealSteps[0];
  els.dim.style.opacity = v.dim;
  els.iris.style.transform = `scale(${v.iris.s})`;
  els.iris.style.opacity = v.iris.o;
  els.img.style.filter = `blur(${v.blur}px) brightness(${v.br})`;

  // 扫光
  els.sweep.classList.remove('run');
  void els.sweep.offsetWidth;
  els.sweep.classList.add('run');
}
updateFrameReveal(0);

/* =============================================================
   卡片展开 —— 位置根据物件智能定位
   ============================================================= */
function showCard(index, itemEl) {
  const s = stories[index];

  // 写内容
  els.mcNum.textContent  = s.num;
  els.mcTag.textContent  = s.tag;
  els.mcBody.innerHTML   = s.body;
  els.mcIcon.innerHTML   = cardIcons[s.icon] || '';

  // 先测量卡片尺寸：临时可见且不动画
  els.card.style.transition = 'none';
  els.card.classList.add('shown');
  const cardRect = els.card.getBoundingClientRect();
  els.card.classList.remove('shown');
  // 强制回流后恢复过渡
  void els.card.offsetWidth;
  els.card.style.transition = '';

  // 计算卡片位置：与物件同侧外推，避开画框
  const pos = computeCardPosition(itemEl, cardRect);
  els.card.style.left = pos.x + 'px';
  els.card.style.top  = pos.y + 'px';

  // 触发可见
  setTimeout(() => {
    els.card.classList.add('shown');
    els.stage.classList.add('has-card');
  }, 60);
}

function computeCardPosition(itemEl, cardRect) {
  const vpW = window.innerWidth;
  const vpH = window.innerHeight;
  const pad = 18;

  const ir = itemEl.getBoundingClientRect();
  const fr = els.frame.getBoundingClientRect();

  const itemCX = ir.left + ir.width / 2;
  const itemCY = ir.top  + ir.height / 2;

  // 物件在视口左还是右
  const onLeft  = itemCX < vpW / 2;
  const onTop   = itemCY < vpH / 2;

  // 目标：卡片贴在物件朝外侧，不越过画框
  let x, y;

  if (onLeft) {
    // 物件在左 → 卡片也在左侧（画框左外），对齐物件
    x = Math.min(ir.left + ir.width + 22, fr.left - cardRect.width - 22);
    x = Math.max(pad, x);
  } else {
    // 物件在右 → 卡片在右侧
    x = Math.max(ir.left - cardRect.width - 22, fr.right + 22);
    x = Math.min(vpW - cardRect.width - pad, x);
  }

  // 纵向：尽量居中对齐物件，但不触顶 / 触底
  y = itemCY - cardRect.height / 2;
  y = Math.max(pad + 60, Math.min(vpH - cardRect.height - pad, y));

  // 窄屏：如果左右都放不下，就放在画框下方
  if ((onLeft  && x + cardRect.width > fr.left) ||
      (!onLeft && x < fr.right)) {
    x = (vpW - cardRect.width) / 2;
    y = Math.min(vpH - cardRect.height - pad, fr.bottom + 16);
  }

  return { x, y };
}

/* 视口变化时（resize）卡片跟随重新定位 */
window.addEventListener('resize', () => {
  if (!els.card.classList.contains('shown')) return;
  const lastIndex = state.unlocked.lastIndexOf(true);
  if (lastIndex < 0) return;
  const itemEl = els.items[lastIndex];
  const cardRect = els.card.getBoundingClientRect();
  const pos = computeCardPosition(itemEl, cardRect);
  els.card.style.left = pos.x + 'px';
  els.card.style.top  = pos.y + 'px';
});

/* =============================================================
   粒子效果
   ============================================================= */
// 物件自身的小流星尾迹
function tinyTrailAt(itemEl) {
  const r = itemEl.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top  + r.height / 2;

  const star = document.createElement('div');
  star.className = 'shooting-star';
  star.style.left = cx + 'px';
  star.style.top  = cy + 'px';
  document.body.appendChild(star);

  const angle = Math.random() * Math.PI * 2;
  const dist = 60 + Math.random() * 30;
  const dx = Math.cos(angle) * dist;
  const dy = Math.sin(angle) * dist;

  const a = star.animate([
    { transform: 'translate(0,0) scale(1)', opacity: 1 },
    { transform: `translate(${dx}px, ${dy}px) scale(0.3)`, opacity: 0 }
  ], { duration: 900, easing: 'cubic-bezier(0.2, 0.8, 0.3, 1)' });
  a.onfinish = () => star.remove();
}

// 从物件飞向画框的星尘
function dustToFrame(itemEl, n = 5) {
  const ir = itemEl.getBoundingClientRect();
  const fr = els.frame.getBoundingClientRect();
  const sx = ir.left + ir.width / 2;
  const sy = ir.top  + ir.height / 2;
  const ex = fr.left + fr.width / 2;
  const ey = fr.top  + fr.height * 0.45;

  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.left = sx + 'px';
    d.style.top  = sy + 'px';
    document.body.appendChild(d);

    const mx = (sx + ex) / 2 + (Math.random() * 80 - 40);
    const my = (sy + ey) / 2 + (Math.random() * 80 - 40);

    const a = d.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 0 },
      { transform: `translate(${mx - sx}px, ${my - sy}px) scale(1.2)`,
        opacity: 1, offset: 0.4 },
      { transform: `translate(${ex - sx}px, ${ey - sy}px) scale(0.3)`,
        opacity: 0 }
    ], { duration: 1400 + Math.random() * 500,
         delay: i * 70,
         easing: 'cubic-bezier(0.3, 0.7, 0.3, 1)' });
    a.onfinish = () => d.remove();
  }
}

/* =============================================================
   最终揭晓
   ============================================================= */
function triggerFinale() {
  els.body.classList.add('final');

  // 卡片柔和消散 —— 为最终画面让出空间
  setTimeout(() => {
    els.card.classList.remove('shown');
    els.stage.classList.remove('has-card');
  }, 300);

  // 星尘从画框向外扩散
  burstDust(40);

  // 主文案 + 祝福
  setTimeout(() => els.finale.classList.add('show'), 1400);

  // 右下彩蛋
  setTimeout(() => els.easter.classList.add('show'), 5000);
}

function burstDust(n = 32) {
  const fr = els.frame.getBoundingClientRect();
  const cx = fr.left + fr.width / 2;
  const cy = fr.top  + fr.height * 0.45;

  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.left = cx + 'px';
    d.style.top  = cy + 'px';
    document.body.appendChild(d);

    const angle = Math.random() * Math.PI * 2;
    const distance = 180 + Math.random() * 260;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;
    const size = 1.5 + Math.random() * 2;
    d.style.width = d.style.height = size + 'px';

    const a = d.animate([
      { transform: 'translate(0,0) scale(0.3)', opacity: 0 },
      { transform: `translate(${dx*0.3}px, ${dy*0.3}px) scale(1)`,
        opacity: 1, offset: 0.25 },
      { transform: `translate(${dx}px, ${dy}px) scale(0.3)`,
        opacity: 0 }
    ], { duration: 2200 + Math.random() * 1200,
         easing: 'cubic-bezier(0.2, 0.7, 0.3, 1)' });
    a.onfinish = () => d.remove();
  }
}

/* =============================================================
   桌面鼠标视差 —— 画框跟视线微微转头
   ============================================================= */
if (matchMedia('(hover: hover)').matches) {
  const frame = document.querySelector('.frame');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth  - 0.5);
    const y = (e.clientY / window.innerHeight - 0.5);
    if (frame) {
      frame.style.transform =
        `rotateY(${9 + x * -4}deg) rotateX(${-5 + y * 3}deg) rotateZ(-1.8deg)`;
    }
  });
}
</script>
